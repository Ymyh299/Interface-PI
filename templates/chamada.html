<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChamadaJá — Chamada do Dia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f0f3f9;
    --surface:  #ffffff;
    --ink:      #1a1a1a;
    --muted:    #6b7280;
    --border:   #e5e7eb;
    --green:    #2e7d46;
    --green-bg: #edf7f1;
    --red:      #c0392b;
    --red-bg:   #fdf1f0;
    --warn:     #9b6700;
    --warn-bg:  #fdf6e3;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 210px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--ink);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg {
    width: 18px; height: 18px;
    fill: none; stroke: white; stroke-width: 1.6; stroke-linecap: round;
  }

  .logo span {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
  }

  .profile {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px 18px;
  }

  .avatar {
    width: 36px; height: 36px;
    background: var(--green-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .avatar svg { width: 20px; height: 20px; fill: var(--green); }

  .profile small { display: block; font-size: 11px; color: var(--muted); }
  .profile strong { font-size: 13px; }

  nav { padding: 0 10px; }

  nav a {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 12px;
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
    transition: background 0.15s, color 0.15s;
  }

  nav a svg {
    width: 16px; height: 16px;
    fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round;
    flex-shrink: 0;
  }

  nav a:hover { background: var(--bg); color: var(--ink); }
  nav a.active { background: var(--ink); color: white; }

  /* ── MAIN ── */
  .main {
    margin-left: 210px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .topbar h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
  }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  select {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--ink); }

  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

  .btn-dark  { background: var(--ink); color: white; }
  .btn-dark:hover { background: #333; }
  .btn-light { background: var(--bg); color: var(--ink); border: 1.5px solid var(--border); }
  .btn-light:hover { border-color: var(--ink); }
  .btn-ghost { background: none; color: var(--muted); }
  .btn-ghost:hover { color: var(--red); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── CONTENT ── */
  .content { padding: 24px 28px; flex: 1; }

  /* Filtros */
  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .filters label { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }

  .filters input[type="date"] {
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }

  .filters input[type="date"]:focus { border-color: var(--ink); }

  /* Cards de stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stat-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .stat-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 1.8; stroke-linecap: round; }
  .stat-icon.green { background: var(--green-bg); }
  .stat-icon.green svg { stroke: var(--green); }
  .stat-icon.red { background: var(--red-bg); }
  .stat-icon.red svg { stroke: var(--red); }
  .stat-icon.warn { background: var(--warn-bg); }
  .stat-icon.warn svg { stroke: var(--warn); }

  .stat small { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .stat strong {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.1;
  }

  .stat:nth-child(1) strong { color: var(--green); }
  .stat:nth-child(2) strong { color: var(--red); }
  .stat:nth-child(3) strong { color: var(--warn); }

  /* Tabela */
  .table-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .table-head h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
  }

  .search {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }

  .search:focus-within { border-color: var(--ink); }

  .search svg { width: 13px; height: 13px; fill: none; stroke: var(--muted); stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }

  .search input {
    border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--ink);
    outline: none; width: 170px;
  }

  .search input::placeholder { color: #bbb; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 10px 20px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9fb; }

  tbody td { padding: 12px 20px; font-size: 13px; }

  .ra { color: var(--muted); font-size: 12px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }

  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }

  .badge.presente { color: var(--green); background: var(--green-bg); }
  .badge.presente::before { background: var(--green); }
  .badge.ausente  { color: var(--red);   background: var(--red-bg);   }
  .badge.ausente::before  { background: var(--red);   }
  .badge.falha    { color: var(--warn);  background: var(--warn-bg);  }
  .badge.falha::before    { background: var(--warn);  }

  .empty {
    padding: 48px 20px;
    text-align: center;
    color: var(--muted);
  }

  .empty svg { width: 36px; height: 36px; fill: none; stroke: #ccc; stroke-width: 1.5; stroke-linecap: round; display: block; margin: 0 auto 10px; }
  .empty p { font-size: 14px; }
  .empty small { font-size: 12px; opacity: 0.7; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C9.5 2 7.2 3 5.5 4.7"/><path d="M19 5.5C17.5 3.7 15.4 2.5 13 2.1"/><path d="M4 9.5C3.4 10.3 3 12.5 3 12.5c0 1.5.3 3 .9 4.3"/><path d="M20.3 9C20.8 10 21 11.2 21 12.5c0 3.5-2.7 7.5-5 9"/><path d="M12 7c-3 0-5 2-5 5s1.2 5.2 3 7"/><path d="M12 7c3 0 5 2 5 5 0 1.5-.4 3-1 4.1"/></svg>
    </div>
    <span>ChamadaJá</span>
  </div>

  <div class="profile">
    <div class="avatar">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div>
      <small>Olá,</small>
      <strong>Professor</strong>
    </div>
  </div>

  <nav>
    <a href="/chamada" class="active">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
      Chamada do dia
    </a>
    <a href="/historico">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Histórico
    </a>
  </nav>
</aside>

<main class="main">
  <div class="topbar">
    <h2>Chamada do dia</h2>
    <div class="topbar-right">
      <select id="turmaSelect">
        <option>Turma C. Computação - IoT</option>
        <option>Turma A. Eng. Software</option>
        <option>Turma B. Sistemas Info.</option>
      </select>
      <button class="btn btn-dark" id="btnEnviar" onclick="enviarChamada()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        Enviar
      </button>
    </div>
  </div>

  <div class="content">

    <div class="filters">
      <label>Data inicial</label>
      <input type="date" id="dataInicial">
      <label>Data final</label>
      <input type="date" id="dataFinal">
      <button class="btn btn-light" onclick="aplicarFiltros()">
        <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Filtrar
      </button>
      <button class="btn btn-ghost" onclick="limparFiltros()">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        Limpar
      </button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <small>Presentes</small>
          <strong id="countPresentes">—</strong>
        </div>
      </div>
      <div class="stat">
        <div class="stat-icon red">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="17"/><line x1="23" y1="11" x2="17" y2="17"/></svg>
        </div>
        <div>
          <small>Ausentes</small>
          <strong id="countAusentes">—</strong>
        </div>
      </div>
      <div class="stat">
        <div class="stat-icon warn">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
          <small>Falhas de leitura</small>
          <strong id="countFalhas">—</strong>
        </div>
      </div>
    </div>

    <div class="table-box">
      <div class="table-head">
        <h3>Registros de presença</h3>
        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Buscar aluno ou RA…" id="searchInput" oninput="filtrarTabela()">
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Aluno</th><th>RA</th><th>Horário</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
      </table>

      <div class="empty" id="emptyState">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 15h8M8 18h5"/></svg>
        <p>Nenhum registro encontrado</p>
        <small>Os dados da chamada aparecerão aqui</small>
      </div>
    </div>

  </div>
</main>

<script>
  let dados = [];

  async function carregarDados() {
    try {
      const res = await fetch('/api/chamada');
      dados = await res.json();
      filtrarTabela();
    } catch (e) { console.error('Erro:', e); }
  }

  const sse = new EventSource('/eventos');
  sse.onmessage = (e) => { if (e.data === 'atualizar') carregarDados(); };

  function renderTabela(lista) {
    const tbody = document.getElementById('tabelaBody');
    const empty = document.getElementById('emptyState');
    tbody.innerHTML = '';
    if (lista.length === 0) { empty.style.display = 'block'; atualizarStats([]); return; }
    empty.style.display = 'none';
    lista.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${r.nome}</td>
        <td><span class="ra">${r.ra}</span></td>
        <td>${r.horario}</td>
        <td><span class="badge ${r.status.toLowerCase()}">${r.status}</span></td>
      `;
      tbody.appendChild(tr);
    });
    atualizarStats(lista);
  }

  function atualizarStats(lista) {
    document.getElementById('countPresentes').textContent = lista.filter(r => r.status === 'Presente').length || '—';
    document.getElementById('countAusentes').textContent  = lista.filter(r => r.status === 'Ausente').length  || '—';
    document.getElementById('countFalhas').textContent    = lista.filter(r => r.status === 'Falha').length    || '—';
  }

  function filtrarTabela() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTabela(dados.filter(r => r.nome.toLowerCase().includes(q) || r.ra.includes(q)));
  }

  function aplicarFiltros() {
    const di = document.getElementById('dataInicial').value;
    const df = document.getElementById('dataFinal').value;
    renderTabela(dados.filter(r => {
      if (!r.data) return true;
      const [d, m, a] = r.data.split('/');
      const iso = `${a}-${m}-${d}`;
      if (di && iso < di) return false;
      if (df && iso > df) return false;
      return true;
    }));
  }

  function limparFiltros() {
    document.getElementById('dataInicial').value = '';
    document.getElementById('dataFinal').value   = '';
    document.getElementById('searchInput').value = '';
    renderTabela(dados);
  }

  async function enviarChamada() {
    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    try {
      const res  = await fetch('/api/forcar-envio', { method: 'POST' });
      const json = await res.json();
      btn.textContent     = json.ok ? '✓ Enviado' : '✗ Erro';
      btn.style.background = json.ok ? '#2e7d46'  : '#c0392b';
    } catch {
      btn.textContent = '✗ Sem conexão';
      btn.style.background = '#c0392b';
    }
    setTimeout(() => {
      btn.disabled = false;
      btn.style.background = '';
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Enviar`;
    }, 3000);
  }

  carregarDados();
</script>
</body>
</html>
